<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Pandinha 🐼</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="login-bg"></div>

    <div class="login-card">
        <div class="login-logo">🐼</div>
        <h1>Pandinha de Jesus</h1>
        <p class="login-sub">Só pra nós dois 💚</p>

        <div id="errorMsg" class="error-msg" style="display:none"></div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button id="btnLogin" class="btn-login">Entrar 💚</button>
    </div>

    <script src="js/auth.js" type="module"></script>
</body>

</html>
